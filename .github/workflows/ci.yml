name: CI tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    working-directory: .

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      # Skip puppeteer's chrome download to avoid puppeteer/puppeteer#14957
      # (extract-zip silently corrupts the extraction on Node 26). We point
      # puppeteer at the system-installed Chrome via channel: "chrome" in
      # the bench tests instead. Drop this once @puppeteer/browsers >= 3 is
      # on npm and the puppeteer dep is bumped past the fix.
      PUPPETEER_SKIP_DOWNLOAD: "true"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node_version: [24]
        include:
          - os: ubuntu-latest
            node_version: 22
          - os: ubuntu-latest
            node_version: 25
          - os: ubuntu-latest
            node_version: 26
      fail-fast: false
    name: "CI tests on node-${{ matrix.node_version }}, ${{ matrix.os }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set node version to ${{ matrix.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          check-latest: true
          cache: "pnpm"

      - name: Install
        run: pnpm install

      - name: Disable AppArmor on Ubuntu
        if: runner.os == 'Linux'
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: Run CI tests
        run: pnpm run ci
